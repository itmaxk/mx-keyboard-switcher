name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux tray dependency
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Build
        run: cargo build --release -p mxks-app --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar -C target/${{ matrix.target }}/release -czf mx-keyboard-switcher-${{ matrix.target }}.tar.gz mx-keyboard-switcher

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive target/${{ matrix.target }}/release/mx-keyboard-switcher.exe mx-keyboard-switcher-${{ matrix.target }}.zip

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: mx-keyboard-switcher-*
